<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% if page.title %}{{ page.title }} | {% endif %}{{ site.title }}</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' https://cdn.jsdelivr.net https://cdnjs.com https://www.googletagmanager.com https://pagead2.googlesyndication.com; style-src 'self' 'unsafe-inline' https://cdnjs.com https://fonts.googleapis.com; font-src 'self' https://cdnjs.com https://fonts.gstatic.com; img-src 'self' data:; connect-src 'self' https://formspree.io https://api.gumroad.com;">
<meta http-equiv="X-Content-Type-Options" content="nosniff">
<meta http-equiv="X-Frame-Options" content="DENY">
<meta name="referrer" content="strict-origin-when-cross-origin">
{% if page.noindex %}
  <meta name="robots" content="noindex, nofollow">
{% endif %}
{% seo %}
<link rel="icon" href="{{ '/assets/img/favicon.svg' | relative_url }}" type="image/svg+xml">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdnjs.com">
<link rel="preload" href="https://fonts.googleapis.com/css2?family=Inter:opsZ,wght@14..32,400..700&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:opsZ,wght@14..32,400..700&display=swap"></noscript>
<link rel="stylesheet" href="https://cdnjs.com/ajax/libs/font-awesome/7.0.0/css/all.min.css" />
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">
<!-- Reemplaza "sha384-..." con el hash real de SRI (https://www.srihash.org/) -->
