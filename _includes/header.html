<header x-data="{ open: false }" class="sticky top-0 z-50 bg-slate-900/80 backdrop-blur border-b border-slate-800">
  <nav class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex justify-between h-16 items-center">
      <a href="{{ '/' | relative_url }}" class="text-xl font-bold bg-gradient-to-r from-cyan-400 to-blue-500 bg-clip-text text-transparent">Mi Portal Digital</a>
      <button @click="open = !open" class="sm:hidden text-slate-300">
        <i class="fa-solid fa-bars text-2xl"></i>
      </button>
      <div class="hidden sm:flex space-x-1">
        {% include navigation-items.html %}
      </div>
    </div>
    <div x-show="open" x-cloak class="sm:hidden pb-4 space-y-2">
      {% include navigation-items.html %}
    </div>
  </nav>
</header>
