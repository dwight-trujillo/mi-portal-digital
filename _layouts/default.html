<!DOCTYPE html>
<html lang="{{ page.lang | default: site.lang }}" class="scroll-smooth">
<head>
  {% include head.html %}
</head>
<body class="bg-slate-950 text-slate-200 font-['Inter'] antialiased">
<a href="#main-content" class="sr-only focus:not-sr-only focus:absolute focus:top-0 focus:left-0 bg-cyan-500 text-white p-2 z-50">Skip to content</a>
  {% include header.html %}
  <main id="main-content" role="main" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    {{ content }}
  </main>
  {% include footer.html %}
  {% include contact-modal.html %}
  {% include cookie-consent.html %}
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.15.1/dist/cdn.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  <script src="https://cdnjs.com/ajax/libs/marked/15.0.7/marked.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  <script src="https://cdnjs.com/ajax/libs/jszip/3.10.1/jszip.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  <script src="https://cdnjs.com/ajax/libs/FileSaver.js/2.0.5/FileSaver.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  <script src="https://cdnjs.com/ajax/libs/dompurify/3.2.4/purify.min.js" integrity="sha384-..." crossorigin="anonymous"></script>
  <script type="module" src="{{ '/assets/js/main.js' | relative_url }}"></script>
</body>
</html>
