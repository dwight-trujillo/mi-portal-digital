<!DOCTYPE html>
<html lang="es" class="scroll-smooth">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Portal Digital</title>
<meta name="description" content="Portal profesional de desarrollo de software, herramientas digitales y contenido de valor.">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🚀</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://cdnjs.cloudflare.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',sans-serif;background:#020617;color:#e2e8f0;min-height:100vh;line-height:1.6}
a{color:inherit;text-decoration:none}
header{position:sticky;top:0;z-index:50;background:rgba(2,6,23,0.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(51,65,85,0.5);padding:0 1rem}
nav{max-width:1280px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;height:64px}
.logo{font-size:1.25rem;font-weight:700;background:linear-gradient(135deg,#22d3ee,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:4px}
.nav-links a{color:#cbd5e1;padding:8px 14px;font-size:14px;border-radius:8px;transition:all 0.2s}
.nav-links a:hover{color:#fff;background:rgba(255,255,255,0.05)}
main{max-width:1280px;margin:0 auto;padding:3rem 1rem}
.hero{text-align:center;padding:4rem 0}
.hero h1{font-size:clamp(2rem,5vw,3.5rem);font-weight:800;margin-bottom:1.5rem;line-height:1.2}
.gradient-text{background:linear-gradient(135deg,#22d3ee,#3b82f6);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.hero p{font-size:1.2rem;color:#94a3b8;margin-bottom:2.5rem;max-width:600px;margin-left:auto;margin-right:auto}
.buttons{display:flex;justify-content:center;gap:1rem;margin-bottom:3rem;flex-wrap:wrap}
.btn-primary{padding:12px 28px;background:linear-gradient(135deg,#06b6d4,#3b82f6);color:#fff;border:none;border-radius:9999px;font-weight:600;font-size:1rem;cursor:pointer;transition:all 0.3s;display:inline-block}
.btn-primary:hover{transform:scale(1.05);box-shadow:0 0 30px rgba(6,182,212,0.3)}
.btn-secondary{padding:12px 28px;background:rgba(30,41,59,0.8);color:#cbd5e1;border:1px solid rgba(51,65,85,0.5);border-radius:9999px;font-weight:500;font-size:1rem;cursor:pointer;transition:all 0.3s;display:inline-block}
.btn-secondary:hover{background:rgba(51,65,85,0.5);color:#fff}
.grid-3{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:1.5rem;max-width:1000px;margin:0 auto}
.card{background:rgba(30,41,59,0.5);backdrop-filter:blur(20px);border:1px solid rgba(148,163,184,0.1);border-radius:16px;padding:2rem;text-align:left;transition:all 0.3s}
.card:hover{border-color:rgba(34,211,238,0.3);transform:translateY(-2px);box-shadow:0 20px 40px rgba(0,0,0,0.3)}
.card i{font-size:2.5rem;color:#22d3ee;margin-bottom:1rem;display:block}
.card h3{font-size:1.3rem;font-weight:600;margin-bottom:0.5rem;color:#fff}
.card p{color:#94a3b8;font-size:0.95rem;line-height:1.6}
footer{border-top:1px solid rgba(51,65,85,0.3);padding:2rem 1rem;text-align:center;color:#64748b;font-size:14px;margin-top:4rem}
@media(max-width:640px){.nav-links{display:none}.grid-3{grid-template-columns:1fr}}
</style>
</head>
<body>
<header>
  <nav>
    <a href="/mi-portal-digital/" class="logo">Mi Portal Digital</a>
    <div class="nav-links">
      <a href="/mi-portal-digital/">Inicio</a>
      <a href="/mi-portal-digital/servicios">Servicios</a>
      <a href="/mi-portal-digital/software">Software</a>
      <a href="/mi-portal-digital/blog">Blog</a>
      <a href="/mi-portal-digital/contacto">Contacto</a>
    </div>
  </nav>
</header>
<main>
  {{ content }}
</main>
<footer>
  <p>© 2026 Dwight Trujillo. Todos los derechos reservados.</p>
</footer>
</body>
</html>
